name: YouTube playlist sync

on:
  schedule:
    - cron: '*/30 11-22 * * *'
    - cron: '0 6 */3 * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Automation action to run'
        required: true
        default: 'sync'
        type: choice
        options:
          - sync
          - renew-webhook
          - all

jobs:
  sync-youtube-playlist:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SYNC_URL: ${{ vars.TV_CAMARA_SYNC_URL || 'https://southamerica-east1-cm-pacatuba.cloudfunctions.net/atualizarPlaylistYoutube' }}
      RENEW_WEBHOOK_URL: ${{ vars.TV_CAMARA_RENEW_WEBHOOK_URL || 'https://southamerica-east1-cm-pacatuba.cloudfunctions.net/renovarWebhookYoutube' }}

    steps:
      - name: Sync playlist
        if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.action == 'sync' || inputs.action == 'all')) || github.event.schedule == '*/30 11-22 * * *' }}
        run: curl --fail --silent --show-error "$SYNC_URL"

      - name: Renew YouTube WebSub subscription
        if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.action == 'renew-webhook' || inputs.action == 'all')) || github.event.schedule == '0 6 */3 * *' }}
        run: curl --fail --silent --show-error "$RENEW_WEBHOOK_URL"
